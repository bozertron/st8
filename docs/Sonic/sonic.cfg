# Sonic Configuration for Maestro Scaffolder Tool
# Lightweight search backend - desktop app context
# Documentation: https://github.com/valeriansaliou/sonic/blob/master/CONFIGURATION.md

[server]

log_level = "warn"


[channel]

inet = "[::1]:1491"
tcp_timeout = 300

auth_password = "maestro_scaffolder_key"

[channel.search]

query_limit_default = 100
query_limit_maximum = 1000
query_alternates_try = 2
suggest_limit_default = 10
suggest_limit_maximum = 50
list_limit_default = 100
list_limit_maximum = 500


[store]

[store.kv]

path = "${SONIC_STORE_PATH}/kv/"

retain_word_objects = 5000

[store.kv.pool]

inactive_after = 3600

[store.kv.database]

flush_after = 300
compress = true
parallelism = 2
max_files = 100
max_compactions = 1
max_flushes = 1
write_buffer = 8192
write_ahead_log = true

[store.fst]

path = "${SONIC_STORE_PATH}/fst/"

[store.fst.pool]

inactive_after = 300

[store.fst.graph]

consolidate_after = 180
max_size = 4096
max_words = 500000
